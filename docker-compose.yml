services:
  opencode:
    image: node:22-alpine
    container_name: opencode
    working_dir: /workspace
    ports:
      # 🌐 Web-UI & API-Endpoint
      - "4096:4096"
    volumes:
      # 📂 Projektordner (persistent)
      - opencode_projects:/workspace
      # ⚙️ OpenCode Konfiguration (persistent)
      - opencode_config:/root/.config/opencode
    environment:
      # 🔑 API-Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # 🤖 Standard-Modell
      - OPENCODE_MODEL=${OPENCODE_MODEL:-deepseek/deepseek-chat}
      # 🖥️ Terminal
      - TERM=xterm-256color
      - COLORTERM=truecolor
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: >-
      sh -c "
        echo '🚀 Installing OpenCode...' &&
        npm install -g opencode-ai@latest --quiet &&
        echo '✅ OpenCode ready!' &&
        echo '🌐 Starting server on port 4096...' &&
        opencode serve --hostname 0.0.0.0 --port 4096
      "
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  opencode_projects:
    name: opencode_projects
  opencode_config:
    name: opencode_config
