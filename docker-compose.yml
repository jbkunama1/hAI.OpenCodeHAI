version: '3.8'

# ============================================================
# 🤖 hAI.OpenCodeHAI - OpenCode Docker/Portainer Stack
# 🔗 https://github.com/jbkunama1/hAI.OpenCodeHAI
# 📄 MIT License | therealteacher
# 🎯 3 Ziele: Browser-UI | Konsole | 9Router API
# ============================================================

services:
  opencode:
    image: node:22-alpine
    container_name: opencode
    working_dir: /workspace
    ports:
      - "4096:4096"
    dns:
      # 🔧 Explizite DNS-Server (Tailscale-Workaround)
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - opencode_projects:/workspace
      - opencode_config:/root/.config/opencode
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-deepseek/deepseek-chat}
      - TERM=xterm-256color
      - COLORTERM=truecolor
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: >-
      sh -c '
        echo "🚀 Installing OpenCode..." &&
        npm install -g opencode-ai@latest --quiet &&
        echo "" &&
        echo "╔════════════════════════════════════════════════╗" &&
        echo "║  🤖 hAI.OpenCodeHAI - Ready!                  ║" &&
        echo "╠════════════════════════════════════════════════╣" &&
        echo "║  🌐 Browser-UI:                                ║" &&
        echo "║     http://<server-ip>:4096                    ║" &&
        echo "║                                                ║" &&
        echo "║  💻 Konsole (Alias auf dem Host):              ║" &&
        echo "║     alias opencode=docker-exec-it-opencode     ║" &&
        echo "║     → dann einfach: opencode                   ║" &&
        echo "║                                                ║" &&
        echo "║  🔌 9Router API-Endpoint:                      ║" &&
        echo "║     http://<server-ip>:4096/v1                 ║" &&
        echo "║                                                ║" &&
        echo "║  🐚 In Container:                              ║" &&
        echo "║     docker exec -it opencode opencode          ║" &&
        echo "╚════════════════════════════════════════════════╝" &&
        echo "" &&
        opencode serve --hostname 0.0.0.0 --port 4096
      '
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  opencode_projects:
    name: opencode_projects
  opencode_config:
    name: opencode_config
