services:
  opencode:
    image: node:22-alpine
    container_name: opencode
    working_dir: /workspace
    volumes:
      # 📂 Projektordner (persistent)
      - opencode_projects:/workspace
      # ⚙️ OpenCode Konfiguration (persistent)
      - opencode_config:/root/.config/opencode
    environment:
      # 🔑 API-Keys (in Portainer unter Environment Variables eintragen)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # 🤖 Standard-Modell (Empfehlung: deepseek/deepseek-chat für Free-Tier)
      - OPENCODE_MODEL=${OPENCODE_MODEL:-deepseek/deepseek-chat}
      # 🌐 Ollama (optional, für lokale Modelle)
      - OLLAMA_HOST=${OLLAMA_HOST:-}
    stdin_open: true
    tty: true
    restart: unless-stopped
    # ⬇️ OpenCode beim Containerstart installieren
    command: >-
      sh -c "
        echo '🚀 Installing OpenCode...' &&
        npm install -g opencode-ai@latest --quiet &&
        echo '✅ OpenCode ready! Enter container with: docker exec -it opencode sh' &&
        echo '   Then run: cd /workspace && opencode' &&
        tail -f /dev/null
      "
    labels:
      # 🔄 Watchtower Auto-Update (optional)
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  opencode_projects:
    name: opencode_projects
  opencode_config:
    name: opencode_config
